<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAWR 🥷🏻</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #ff0000;
            --accent-glow: rgba(255, 0, 0, 0.6);
            --bg: #050505;
            --card-bg: rgba(20, 20, 20, 0.7);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --error-bg: rgba(255, 0, 0, 0.15);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: var(--bg);
            color: var(--text-primary);
            overflow: hidden;
        }

        /* --- BACKGROUND EFFECTS --- */
        body::before {
            content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0000 0%, #050505 100%);
            z-index: -1;
        }

        /* --- AUTH SCREEN --- */
        #auth-overlay {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 20px; z-index: 1000;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.8);
            transition: opacity 0.5s ease;
        }

        .glass-card {
            background: var(--card-bg);
            width: 100%; max-width: 400px;
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container { margin-bottom: 30px; }
        .logo {
            font-size: 50px; font-weight: 800; color: var(--accent);
            letter-spacing: 5px; margin: 0;
            text-shadow: 0 0 20px var(--accent-glow);
        }
        .subtitle {
            font-size: 11px; color: var(--text-secondary);
            letter-spacing: 3px; text-transform: uppercase; margin-top: 5px;
        }

        /* --- FORM STYLES --- */
        .form-group { margin-bottom: 15px; text-align: left; }
        label {
            display: block; font-size: 10px; color: var(--text-secondary);
            margin-bottom: 8px; font-weight: 600; letter-spacing: 1px;
        }

        .input-wrapper { position: relative; }
        .input-wrapper i {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: var(--text-secondary); font-size: 14px;
        }

        .gawr-input {
            width: 100%; padding: 14px 15px 14px 45px;
            background: var(--input-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; color: white; font-size: 15px; outline: none;
            transition: all 0.3s ease;
        }
        .gawr-input:focus {
            border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.08);
        }

        .main-btn {
            width: 100%; padding: 16px; background: var(--accent);
            border: none; border-radius: 12px; color: white;
            font-size: 15px; font-weight: 700; cursor: pointer;
            margin-top: 20px; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3);
            text-transform: uppercase; letter-spacing: 1px;
        }
        .main-btn:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255, 0, 0, 0.4); }
        .main-btn:disabled { background: #444; box-shadow: none; cursor: wait; transform: none; }

        .auth-footer { margin-top: 25px; font-size: 13px; color: var(--text-secondary); }
        .link { color: var(--accent); cursor: pointer; font-weight: 600; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        /* --- ERROR BOX --- */
        #error-box {
            background: var(--error-bg); color: #ff5555;
            padding: 12px 15px; border-radius: 10px; font-size: 13px;
            margin-bottom: 20px; border-left: 3px solid var(--accent);
            display: none; line-height: 1.4; text-align: left;
        }

        /* --- LOADER --- */
        .spinner {
            width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.8s linear infinite; display: none; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- APP LAYOUT --- */
        #app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        
        .sidebar { background: #0a0a0a; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; }
        
        .chat-area { display: flex; flex-direction: column; background: #050505; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { max-width: 70%; padding: 12px 16px; border-radius: 18px; font-size: 14px; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #1a1a1a; border-bottom-left-radius: 4px; }
        .msg-info { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }

        .chat-input { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #1a1a1a; }
        .chat-input input { 
            flex: 1; background: #141414; border: 1px solid #222; border-radius: 25px; 
            padding: 12px 20px; color: white; outline: none; 
        }

        /* --- PHONE AUTH SPECIFIC --- */
        #recaptcha-container { margin: 15px 0; }
        
        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div class="glass-card" id="auth-card">
            <div class="logo-container">
                <h1 class="logo">GAWR</h1>
                <div class="subtitle">Secure Messenger</div>
            </div>

            <div id="error-box"></div>

            <div id="email-section">
                <div class="form-group" id="name-field">
                    <label>ВАШЕ ИМЯ</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="reg-name" class="gawr-input" placeholder="Введите имя">
                    </div>
                </div>

                <div class="form-group">
                    <label>EMAIL</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="auth-email" class="gawr-input" placeholder="mail@gawr.me">
                    </div>
                </div>

                <div class="form-group">
                    <label>ПАРОЛЬ</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="auth-pass" class="gawr-input" placeholder="••••••••">
                    </div>
                </div>

                <button id="submit-btn" class="main-btn" onclick="handleAuth()">
                    <span id="btn-text">СОЗДАТЬ АККАУНТ</span>
                    <div class="spinner" id="btn-loader"></div>
                </button>

                <div class="auth-footer">
                    <p id="toggle-method-text">Войти по <span class="link" onclick="switchMethod('phone')">номеру телефона</span></p>
                    <p id="toggle-mode-text">Уже есть аккаунт? <span class="link" onclick="toggleAuthMode()">Войти</span></p>
                </div>
            </div>

            <div id="phone-section" style="display: none;">
                <div class="form-group">
                    <label>НОМЕР ТЕЛЕФОНА</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="auth-phone" class="gawr-input" placeholder="+7 900 000 00 00">
                    </div>
                </div>

                <div id="recaptcha-container"></div>

                <div id="otp-group" style="display: none;">
                    <div class="form-group">
                        <label>КОД ИЗ SMS</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-message"></i>
                            <input type="number" id="auth-otp" class="gawr-input" placeholder="000000">
                        </div>
                    </div>
                </div>

                <button id="phone-submit-btn" class="main-btn" onclick="handlePhoneAuth()">
                    <span id="phone-btn-text">ПОЛУЧИТЬ КОД</span>
                </button>

                <div class="auth-footer">
                    <p>Войти через <span class="link" onclick="switchMethod('email')">Email</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div style="display:flex; align-items:center; gap:10px;">
                    <div style="width:40px; height:40px; background:var(--accent); border-radius:12px; display:flex; align-items:center; justify-content:center; font-weight:800;" id="user-initial">?</div>
                    <div>
                        <div style="font-size:14px; font-weight:600;" id="sidebar-name">User</div>
                        <div style="font-size:11px; color:var(--text-secondary);">online</div>
                    </div>
                </div>
                <i class="fa-solid fa-right-from-bracket link" onclick="logout()"></i>
            </div>
            <div style="padding:20px; color:var(--text-secondary); font-size:12px;">Global Chat</div>
        </div>

        <div class="chat-area">
            <div class="messages" id="message-container"></div>
            <div class="chat-input">
                <input type="text" id="chat-msg" placeholder="Сообщение..." onkeydown="if(event.key==='Enter') sendMessage()">
                <button class="main-btn" style="margin:0; width:auto; padding:10px 20px;" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        /* =========================================================
           1. FIREBASE INITIALIZATION
           ========================================================= */
        const firebaseConfig = {
            apiKey: "AIzaSyAbfPtl2auXZeiFlTBgrw5HUR742SlBM88",
            authDomain: "gawr-69377.firebaseapp.com",
            databaseURL: "https://gawr-69377-default-rtdb.firebaseio.com",
            projectId: "gawr-69377",
            storageBucket: "gawr-69377.firebasestorage.app",
            messagingSenderId: "89649220321",
            appId: "1:89649220321:web:479e1aa4ee08517a5cc5a0",
            measurementId: "G-B9QNGMXCTT"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        /* =========================================================
           2. GLOBAL STATE
           ========================================================= */
        let isLoginMode = false;
        let authMethod = 'email'; // email or phone
        let confirmationResult = null;
        let currentUser = null;

        // Init Recaptcha once
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            'size': 'invisible',
            'callback': (response) => { console.log("Recaptcha solved"); }
        });

        /* =========================================================
           3. UI CONTROLS
           ========================================================= */
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('name-field').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('btn-text').innerText = isLoginMode ? 'ВОЙТИ' : 'СОЗДАТЬ АККАУНТ';
            document.getElementById('toggle-mode-text').innerHTML = isLoginMode ? 
                'Нет аккаунта? <span class="link" onclick="toggleAuthMode()">Регистрация</span>' : 
                'Уже есть аккаунт? <span class="link" onclick="toggleAuthMode()">Войти</span>';
            hideError();
        }

        function switchMethod(method) {
            authMethod = method;
            document.getElementById('email-section').style.display = method === 'email' ? 'block' : 'none';
            document.getElementById('phone-section').style.display = method === 'phone' ? 'block' : 'none';
            hideError();
        }

        function showError(msg) {
            const box = document.getElementById('error-box');
            box.innerText = msg;
            box.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-box').style.display = 'none';
        }

        function setBtnLoading(isLoading) {
            const btn = authMethod === 'email' ? document.getElementById('submit-btn') : document.getElementById('phone-submit-btn');
            const text = authMethod === 'email' ? document.getElementById('btn-text') : document.getElementById('phone-btn-text');
            const loader = document.getElementById('btn-loader');

            btn.disabled = isLoading;
            if (isLoading) {
                text.style.display = 'none';
                if(loader) loader.style.display = 'block';
            } else {
                text.style.display = 'block';
                if(loader) loader.style.display = 'none';
            }
        }

        /* =========================================================
           4. AUTHENTICATION LOGIC (EMAIL & PHONE)
           ========================================================= */
        async function handleAuth() {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-pass').value.trim();
            const name = document.getElementById('reg-name').value.trim();

            if (!email || !pass) return showError("Заполните Email и Пароль");
            
            hideError();
            setBtnLoading(true);

            try {
                if (isLoginMode) {
                    await auth.signInWithEmailAndPassword(email, pass);
                } else {
                    if (!name) throw { code: 'custom/no-name', message: 'Введите ваше имя' };
                    const userCredential = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(userCredential.user.uid).set({
                        name: name,
                        email: email,
                        createdAt: Date.now()
                    });
                }
            } catch (error) {
                handleFirebaseError(error);
            } finally {
                setBtnLoading(false);
            }
        }

        async function handlePhoneAuth() {
            const phone = document.getElementById('auth-phone').value.trim();
            const otp = document.getElementById('auth-otp').value.trim();
            const btnText = document.getElementById('phone-btn-text');

            hideError();

            try {
                if (!confirmationResult) {
                    // Send SMS
                    if (!phone) return showError("Введите номер телефона");
                    setBtnLoading(true);
                    confirmationResult = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
                    document.getElementById('otp-group').style.display = 'block';
                    btnText.innerText = 'ПОДТВЕРДИТЬ';
                    setBtnLoading(false);
                } else {
                    // Verify OTP
                    if (!otp) return showError("Введите код из SMS");
                    setBtnLoading(true);
                    const result = await confirmationResult.confirm(otp);
                    const user = result.user;
                    
                    // Check if user exists in Firestore
                    const doc = await db.collection('users').doc(user.uid).get();
                    if (!doc.exists) {
                        await db.collection('users').doc(user.uid).set({
                            name: "Gawr User",
                            phone: user.phoneNumber,
                            createdAt: Date.now()
                        });
                    }
                }
            } catch (error) {
                handleFirebaseError(error);
                setBtnLoading(false);
                // Reset on error
                if(error.code === 'auth/invalid-verification-code') {
                    document.getElementById('auth-otp').value = '';
                }
            }
        }

        function handleFirebaseError(error) {
            console.error("Auth Error:", error);
            let message = "Произошла ошибка. Попробуйте снова.";

            switch (error.code) {
                case 'auth/operation-not-allowed':
                    message = "Метод входа отключен. Включите Email/Password или Телефон в Firebase Console → Authentication → Sign-in method";
                    break;
                case 'auth/network-request-failed':
                    message = "Ошибка сети. Проверьте соединение с интернетом.";
                    break;
                case 'auth/invalid-email':
                    message = "Некорректный адрес электронной почты.";
                    break;
                case 'auth/wrong-password':
                    message = "Неверный пароль.";
                    break;
                case 'auth/user-not-found':
                    message = "Пользователь не найден.";
                    break;
                case 'auth/email-already-in-use':
                    message = "Данный Email уже зарегистрирован.";
                    break;
                case 'auth/too-many-requests':
                    message = "Слишком много запросов. Подождите немного.";
                    break;
                case 'auth/invalid-verification-code':
                    message = "Неверный код из SMS.";
                    break;
                case 'custom/no-name':
                    message = "Пожалуйста, введите ваше имя для регистрации.";
                    break;
                default:
                    message = error.message;
            }
            showError(message);
        }

        /* =========================================================
           5. APP CORE LOGIC (CHAT)
           ========================================================= */
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                const userDoc = await db.collection('users').doc(user.uid).get();
                const userData = userDoc.data() || { name: "User" };
                
                document.getElementById('sidebar-name').innerText = userData.name;
                document.getElementById('user-initial').innerText = userData.name.charAt(0).toUpperCase();
                
                document.getElementById('auth-overlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('auth-overlay').style.display = 'none';
                    document.getElementById('app').style.display = 'grid';
                }, 500);

                startChatListener();
            } else {
                document.getElementById('app').style.display = 'none';
                document.getElementById('auth-overlay').style.display = 'flex';
                document.getElementById('auth-overlay').style.opacity = '1';
            }
        });

        function startChatListener() {
            db.collection('messages')
              .orderBy('timestamp', 'asc')
              .limitToLast(50)
              .onSnapshot(snapshot => {
                  const container = document.getElementById('message-container');
                  container.innerHTML = '';
                  snapshot.forEach(doc => {
                      const data = doc.data();
                      renderMessage(data);
                  });
                  container.scrollTop = container.scrollHeight;
              });
        }

        function renderMessage(data) {
            const container = document.getElementById('message-container');
            const isMe = data.uid === currentUser.uid;
            
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            
            const time = data.timestamp ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '...';
            
            div.innerHTML = `
                <div style="font-size:11px; opacity:0.7; margin-bottom:4px; font-weight:bold;">${data.userName}</div>
                <div>${data.text}</div>
                <div class="msg-info">${time}</div>
            `;
            container.appendChild(div);
        }

        async function sendMessage() {
            const input = document.getElementById('chat-msg');
            const text = input.value.trim();
            if (!text) return;

            input.value = '';
            const userDoc = await db.collection('users').doc(currentUser.uid).get();
            const userData = userDoc.data();

            await db.collection('messages').add({
                text: text,
                uid: currentUser.uid,
                userName: userData.name,
                timestamp: Date.now()
            });
        }

        function logout() {
            auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RUN Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f10;
            --card: #1a1a1c;
            --accent: #ff2a2a;
            --text: #ffffff;
            --text-dim: #a0a0a5;
            --border: #252528;
            --msg-in: #222224;
            --msg-out: #ff2a2a;
        }

        [data-theme="white"] {
            --bg: #f0f0f2; --card: #ffffff; --text: #000000; --text-dim: #707075; --border: #e0e0e5; --msg-in: #e4e4e7;
        }
        [data-theme="black"] {
            --bg: #000000; --card: #0a0a0a; --text: #ffffff; --text-dim: #888888; --border: #1a1a1a; --msg-in: #111111;
        }
        [data-theme="purple"] {
            --bg: #120e1a; --card: #1e162e; --accent: #9d4edd; --text: #ffffff; --text-dim: #b3a0c9; --border: #2d2342; --msg-in: #261d3a; --msg-out: #9d4edd;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); 
            height: 100vh; overflow: hidden; transition: 0.3s;
        }

        /* Auth */
        #auth-container {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto;
        }
        .auth-box { width: 100%; max-width: 380px; text-align: center; }
        .logo { font-size: 48px; font-weight: 800; color: var(--accent); margin-bottom: 30px; letter-spacing: -2px; }
        
        .photo-upload {
            width: 100px; height: 100px; border-radius: 50%; background: var(--card); border: 2px dashed var(--accent);
            margin: 0 auto 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .photo-upload img { width: 100%; height: 100%; object-fit: cover; }
        .photo-upload i { font-size: 24px; color: var(--text-dim); }

        input, button { 
            width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid var(--border);
            background: var(--card); color: var(--text); font-size: 16px;
        }
        button.primary { background: var(--accent); color: #fff; border: none; font-weight: 700; cursor: pointer; }
        button.tg-btn { background: #0088cc; color: #fff; border: none; }
        
        .switch-auth { cursor: pointer; color: var(--accent); margin-top: 15px; font-weight: 500; font-size: 14px; }

        /* Main Layout */
        #app { display: none; height: 100vh; flex-direction: column; }
        header { 
            padding: 20px; display: flex; justify-content: space-between; align-items: center; 
            background: var(--bg); border-bottom: 1px solid var(--border);
        }
        header h1 { margin: 0; font-size: 22px; font-weight: 700; }
        
        .content { flex: 1; overflow-y: auto; position: relative; }
        .screen { display: none; height: 100%; }
        .screen.active { display: block; }

        nav { 
            height: 70px; border-top: 1px solid var(--border); display: flex; background: var(--card);
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-dim); cursor: pointer; font-size: 12px;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Chat List */
        .list-item { 
            display: flex; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .list-item:active { background: var(--border); }
        .avatar { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; margin-right: 15px; background: #333; }
        .item-info { flex: 1; min-width: 0; }
        .item-row { display: flex; justify-content: space-between; align-items: center; }
        .item-name { font-weight: 600; font-size: 16px; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .item-msg { color: var(--text-dim); font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .verified { color: #00c8ff; font-size: 12px; }

        /* Chat Window Overlay */
        #chat-window {
            position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: none; flex-direction: column;
        }
        .chat-head { padding: 10px 15px; display: flex; align-items: center; background: var(--card); border-bottom: 1px solid var(--border); }
        .chat-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-input { padding: 15px; display: flex; align-items: center; gap: 10px; background: var(--card); }
        .chat-input input { margin: 0; border-radius: 20px; }
        
        .msg { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 15px; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--msg-out); color: #fff; border-bottom-right-radius: 2px; }
        .msg.received { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 4px; text-align: right; }
        .msg img { width: 100%; border-radius: 8px; margin-top: 5px; }

        /* Settings */
        .settings-sec { padding: 20px; }
        .theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .theme-btn { 
            padding: 10px; border-radius: 10px; border: 1px solid var(--border); cursor: pointer; text-align: center; font-size: 14px;
        }

        /* Modals */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1500; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .modal { background: var(--card); width: 100%; max-width: 400px; padding: 20px; border-radius: 15px; }

        /* Audio recording anim */
        .rec-active { color: var(--accent) !important; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #toast {
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #333; color: #fff;
            padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 3000; display: none;
        }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="auth-container">
    <div class="auth-box" id="reg-form">
        <div class="logo">RUN</div>
        <input type="file" id="reg-file" hidden accept="image/*">
        <div class="photo-upload" onclick="document.getElementById('reg-file').click()">
            <img id="reg-preview" style="display:none">
            <i class="fa-solid fa-camera" id="reg-cam-icon"></i>
        </div>
        <input type="text" id="reg-name" placeholder="Имя (Nickname)">
        <input type="text" id="reg-user" placeholder="Username (@username)">
        <input type="email" id="reg-email" placeholder="Email">
        <input type="password" id="reg-pass" placeholder="Пароль">
        <button class="primary" onclick="handleRegister()">Зарегистрироваться</button>
        <button class="tg-btn" onclick="alert('Функция в бета-разработке')"><i class="fa-brands fa-telegram"></i> Войти через Telegram (BETA)</button>
        <div class="switch-auth" onclick="toggleAuth(false)">Уже есть аккаунт? Войти</div>
    </div>

    <div class="auth-box" id="login-form" style="display:none">
        <div class="logo">RUN</div>
        <input type="email" id="log-email" placeholder="Email">
        <input type="password" id="log-pass" placeholder="Пароль">
        <button class="primary" onclick="handleLogin()">Войти</button>
        <button class="tg-btn" onclick="alert('Функция в бета-разработке')"><i class="fa-brands fa-telegram"></i> Войти через Telegram (BETA)</button>
        <div class="switch-auth" onclick="toggleAuth(true)">Нет аккаунта? Регистрация</div>
    </div>
</div>

<div id="app">
    <header>
        <h1 id="view-title">Чаты</h1>
        <div style="display:flex; gap:15px;">
            <i class="fa-solid fa-plus" onclick="showAddContact()" style="cursor:pointer"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </div>
    </header>

    <div class="content">
        <div id="screen-chats" class="screen active">
            <div id="chats-list"></div>
        </div>

        <div id="screen-contacts" class="screen">
            <div style="padding:15px">
                <input type="text" id="search-contacts" placeholder="Поиск пользователей..." oninput="searchUsers(this.value)">
            </div>
            <div id="contacts-list"></div>
        </div>

        <div id="screen-settings" class="screen">
            <div class="settings-sec" style="text-align:center">
                <img id="set-photo" class="avatar" style="width:80px; height:80px; margin:0 auto 10px">
                <h3 id="set-name" style="margin:5px 0"></h3>
                <p id="set-user" style="color:var(--text-dim); margin:0"></p>
                <button style="width:auto; padding:8px 15px; font-size:12px; margin-top:10px" onclick="document.getElementById('edit-file').click()">Сменить фото</button>
                <input type="file" id="edit-file" hidden onchange="updatePhoto(this.files[0])">
            </div>
            
            <div class="settings-sec">
                <label style="font-size:12px; color:var(--text-dim)">Имя</label>
                <input type="text" id="edit-name" placeholder="Имя">
                <label style="font-size:12px; color:var(--text-dim)">Username</label>
                <input type="text" id="edit-user" placeholder="Username">
                <button class="primary" onclick="updateProfileData()">Сохранить изменения</button>
            </div>

            <div class="settings-sec">
                <label style="font-size:12px; color:var(--text-dim)">Тема оформления</label>
                <div class="theme-grid">
                    <div class="theme-btn" onclick="setTheme('dark')" style="background:#1a1a1c">Тёмная</div>
                    <div class="theme-btn" onclick="setTheme('white')" style="background:#fff; color:#000">Белая</div>
                    <div class="theme-btn" onclick="setTheme('black')" style="background:#000">Чёрная</div>
                    <div class="theme-btn" onclick="setTheme('purple')" style="background:#1e162e">Фиолетовая</div>
                </div>
            </div>

            <div class="settings-sec">
                <button onclick="handleLogout()" style="color:var(--accent); border-color:var(--accent)">Выйти из аккаунта</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item" onclick="switchView('contacts')">
            <i class="fa-solid fa-user-group"></i>
            <span>Контакты</span>
        </div>
        <div class="nav-item active" onclick="switchView('chats')">
            <i class="fa-solid fa-comment"></i>
            <span>Чаты</span>
        </div>
        <div class="nav-item" onclick="switchView('settings')">
            <i class="fa-solid fa-gear"></i>
            <span>Настройки</span>
        </div>
    </nav>
</div>

<div id="chat-window">
    <div class="chat-head">
        <i class="fa-solid fa-arrow-left" onclick="closeChat()" style="padding:10px; cursor:pointer"></i>
        <img id="chat-avatar" class="avatar" style="width:35px; height:35px; margin:0 10px">
        <div style="flex:1">
            <div id="chat-name" style="font-weight:600; font-size:15px; display:flex; align-items:center; gap:5px"></div>
            <div id="chat-status" style="font-size:11px; color:var(--text-dim)">в сети</div>
        </div>
    </div>
    <div class="chat-body" id="chat-msgs"></div>
    <div class="chat-input">
        <i class="fa-solid fa-paperclip" onclick="document.getElementById('msg-file').click()" style="cursor:pointer; color:var(--text-dim)"></i>
        <input type="file" id="msg-file" hidden accept="image/*" onchange="sendImage(this.files[0])">
        <input type="text" id="msg-input" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendText()">
        <i class="fa-solid fa-microphone" id="mic-btn" style="cursor:pointer; color:var(--text-dim)" onmousedown="startRec()" onmouseup="stopRec()" ontouchstart="startRec()" ontouchend="stopRec()"></i>
        <i class="fa-solid fa-paper-plane" onclick="sendText()" style="color:var(--accent); cursor:pointer"></i>
    </div>
</div>

<div id="modal-overlay" onclick="this.style.display='none'">
    <div class="modal" onclick="event.stopPropagation()">
        <h3 style="margin-top:0">Добавить контакт</h3>
        <input type="text" id="add-user-input" placeholder="@username">
        <div id="add-res" style="margin:10px 0"></div>
        <button class="primary" onclick="findUserForChat()">Найти и начать чат</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAbfPtl2auXZeiFlTBgrw5HUR742SlBM88",
        authDomain: "gawr-69377.firebaseapp.com",
        databaseURL: "https://gawr-69377-default-rtdb.firebaseio.com",
        projectId: "gawr-69377",
        storageBucket: "gawr-69377.firebasestorage.app",
        messagingSenderId: "89649220321",
        appId: "1:89649220321:web:479e1aa4ee08517a5cc5a0",
        measurementId: "G-B9QNGMXCTT"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let me = null;
    let activeChat = null;
    let unsubMsgs = null;
    let recorder = null;
    let audioChunks = [];

    // Auth logic
    document.getElementById('reg-file').onchange = e => {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
            document.getElementById('reg-preview').src = ev.target.result;
            document.getElementById('reg-preview').style.display = 'block';
            document.getElementById('reg-cam-icon').style.display = 'none';
        };
        reader.readAsDataURL(file);
    };

    function toggleAuth(toReg) {
        document.getElementById('reg-form').style.display = toReg ? 'block' : 'none';
        document.getElementById('login-form').style.display = toReg ? 'none' : 'block';
    }

    async function handleRegister() {
        const name = document.getElementById('reg-name').value.trim();
        const user = document.getElementById('reg-user').value.trim().toLowerCase();
        const email = document.getElementById('reg-email').value.trim();
        const pass = document.getElementById('reg-pass').value;
        const file = document.getElementById('reg-file').files[0];

        if(!name || !user || !email || !pass || !file) return toast("Заполните все поля и выберите фото");
        if(!user.startsWith('@')) return toast("Username должен начинаться с @");

        toast("Проверка username...");
        const snap = await db.collection('users').where('username', '==', user).get();
        if(!snap.empty) return toast("Этот username уже занят");

        try {
            toast("Создание аккаунта...");
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            const uid = res.user.uid;
            
            const ref = storage.ref(`avatars/${uid}`);
            await ref.put(file);
            const photoURL = await ref.getDownloadURL();

            await db.collection('users').doc(uid).set({
                uid, name, username: user, email, photoURL, 
                online: true, lastSeen: Date.now()
            });
            
            // Create initial bot chat
            await db.collection('chats').doc(`run-bot_${uid}`).set({
                id: `run-bot_${uid}`,
                participants: ['run-bot', uid],
                lastMsg: "Добро пожаловать в RUN!",
                updatedAt: Date.now()
            });

        } catch (err) { toast(err.message); }
    }

    async function handleLogin() {
        const email = document.getElementById('log-email').value.trim();
        const pass = document.getElementById('log-pass').value;
        if(!email || !pass) return toast("Введите данные");
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(err) { toast(err.message); }
    }

    auth.onAuthStateChanged(async user => {
        if(user) {
            const doc = await db.collection('users').doc(user.uid).get();
            me = doc.data();
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            loadSettings();
            listenChats();
        } else {
            document.getElementById('auth-container').style.display = 'flex';
            document.getElementById('app').style.display = 'none';
        }
    });

    // Navigation
    function switchView(view) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(`screen-${view}`).classList.add('active');
        event.currentTarget.classList.add('active');
        document.getElementById('view-title').innerText = view === 'chats' ? 'Чаты' : (view === 'contacts' ? 'Контакты' : 'Настройки');
        if(view === 'contacts') searchUsers('');
    }

    // Chats
    function listenChats() {
        db.collection('chats')
            .where('participants', 'array-contains', me.uid)
            .orderBy('updatedAt', 'desc')
            .onSnapshot(async snap => {
                const list = document.getElementById('chats-list');
                list.innerHTML = '';
                for(const doc of snap.docs) {
                    const chat = doc.data();
                    const otherId = chat.participants.find(p => p !== me.uid);
                    let other = null;
                    
                    if(otherId === 'run-bot') {
                        other = { name: 'run-bot', photoURL: 'https://cdn-icons-png.flaticon.com/512/4712/4712109.png', username: 'System', verified: true };
                    } else {
                        // Admin bypass: if me is admin, show actual partner or context
                        const uDoc = await db.collection('users').doc(otherId).get();
                        other = uDoc.data();
                    }
                    
                    if(!other) continue;

                    const div = document.createElement('div');
                    div.className = 'list-item';
                    div.onclick = () => openChat(chat.id, other);
                    div.innerHTML = `
                        <img src="${other.photoURL}" class="avatar">
                        <div class="item-info">
                            <div class="item-row">
                                <div class="item-name">${other.name} ${other.verified ? '<i class="fa-solid fa-circle-check verified"></i>' : ''}</div>
                            </div>
                            <div class="item-msg">${chat.lastMsg || ''}</div>
                        </div>
                    `;
                    list.appendChild(div);
                }
            });
    }

    async function openChat(chatId, target) {
        activeChat = { id: chatId, target };
        document.getElementById('chat-window').style.display = 'flex';
        document.getElementById('chat-name').innerHTML = `${target.name} ${target.verified ? '<i class="fa-solid fa-circle-check verified"></i>' : ''}`;
        document.getElementById('chat-avatar').src = target.targetPhoto || target.photoURL;
        
        const body = document.getElementById('chat-msgs');
        body.innerHTML = '';

        if(unsubMsgs) unsubMsgs();
        unsubMsgs = db.collection('messages')
            .where('chatId', '==', chatId)
            .orderBy('createdAt', 'asc')
            .onSnapshot(snap => {
                snap.docChanges().forEach(change => {
                    if(change.type === 'added') appendMsg(change.doc.data());
                });
            });
    }

    function appendMsg(m) {
        const body = document.getElementById('chat-msgs');
        const isMe = m.senderId === me.uid;
        const div = document.createElement('div');
        div.className = `msg ${isMe ? 'sent' : 'received'}`;
        
        let content = m.text || '';
        if(m.type === 'image') content = `<img src="${m.imageUrl}">`;
        if(m.type === 'audio') content = `<audio src="${m.audioUrl}" controls style="width:200px"></audio>`;

        const time = new Date(m.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        div.innerHTML = `${content} <div class="msg-time">${time}</div>`;
        body.appendChild(div);
        body.scrollTop = body.scrollHeight;
    }

    async function sendText() {
        const input = document.getElementById('msg-input');
        const val = input.value.trim();
        if(!val || !activeChat) return;
        input.value = '';

        // Admin broadcast logic
        if(me.username === '@uioo' && activeChat.target.name === 'run-bot') {
            broadcast(val, 'text');
            return;
        }

        await db.collection('messages').add({
            chatId: activeChat.id,
            senderId: me.uid,
            type: 'text',
            text: val,
            createdAt: Date.now()
        });
        await db.collection('chats').doc(activeChat.id).update({ lastMsg: val, updatedAt: Date.now() });
    }

    async function sendImage(file) {
        if(!file || !activeChat) return;
        toast("Отправка фото...");
        const ref = storage.ref(`chats/${activeChat.id}/${Date.now()}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();

        if(me.username === '@uioo' && activeChat.target.name === 'run-bot') {
            broadcast(url, 'image');
            return;
        }

        await db.collection('messages').add({
            chatId: activeChat.id, senderId: me.uid, type: 'image', imageUrl: url, createdAt: Date.now()
        });
        await db.collection('chats').doc(activeChat.id).update({ lastMsg: '📷 Фото', updatedAt: Date.now() });
    }

    async function broadcast(content, type) {
        toast("Рассылка...");
        const users = await db.collection('users').get();
        users.forEach(async u => {
            const cid = `run-bot_${u.id}`;
            await db.collection('messages').add({
                chatId: cid, senderId: 'run-bot', type, 
                [type === 'text' ? 'text' : 'imageUrl']: content, 
                createdAt: Date.now()
            });
            await db.collection('chats').doc(cid).update({ 
                lastMsg: type === 'text' ? content : '📷 Фото', 
                updatedAt: Date.now() 
            });
        });
    }

    // MediaRecorder for Audio
    async function startRec() {
        if(!navigator.mediaDevices) return toast("Микрофон не поддерживается");
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        recorder = new MediaRecorder(stream);
        audioChunks = [];
        recorder.ondataavailable = e => audioChunks.push(e.data);
        recorder.start();
        document.getElementById('mic-btn').classList.add('rec-active');
    }

    async function stopRec() {
        if(!recorder) return;
        recorder.stop();
        document.getElementById('mic-btn').classList.remove('rec-active');
        recorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            toast("Отправка аудио...");
            const ref = storage.ref(`chats/${activeChat.id}/audio_${Date.now()}`);
            await ref.put(blob);
            const url = await ref.getDownloadURL();
            await db.collection('messages').add({
                chatId: activeChat.id, senderId: me.uid, type: 'audio', audioUrl: url, createdAt: Date.now()
            });
            await db.collection('chats').doc(activeChat.id).update({ lastMsg: '🎤 Голосовое сообщение', updatedAt: Date.now() });
        };
    }

    function closeChat() {
        document.getElementById('chat-window').style.display = 'none';
        if(unsubMsgs) unsubMsgs();
        activeChat = null;
    }

    // Contacts & Search
    async function searchUsers(val) {
        const list = document.getElementById('contacts-list');
        list.innerHTML = '<p style="padding:15px; color:var(--text-dim)">Загрузка...</p>';
        const q = val.toLowerCase();
        let snap;
        if(q) {
            snap = await db.collection('users').where('username', '>=', q).where('username', '<=', q + '\uf8ff').limit(20).get();
        } else {
            snap = await db.collection('users').limit(20).get();
        }
        
        list.innerHTML = '';
        snap.forEach(doc => {
            const u = doc.data();
            if(u.uid === me.uid) return;
            const div = document.createElement('div');
            div.className = 'list-item';
            div.onclick = () => startChatWith(u);
            div.innerHTML = `
                <img src="${u.photoURL}" class="avatar">
                <div class="item-info">
                    <div class="item-name">${u.name}</div>
                    <div class="item-msg">${u.username}</div>
                </div>
                <i class="fa-solid fa-paper-plane" style="color:var(--accent)"></i>
            `;
            list.appendChild(div);
        });
    }

    async function startChatWith(user) {
        const id = me.uid < user.uid ? `${me.uid}_${user.uid}` : `${user.uid}_${me.uid}`;
        await db.collection('chats').doc(id).set({
            id, participants: [me.uid, user.uid], updatedAt: Date.now()
        }, { merge: true });
        openChat(id, user);
    }

    function showAddContact() { document.getElementById('modal-overlay').style.display='flex'; }
    
    async function findUserForChat() {
        const user = document.getElementById('add-user-input').value.trim().toLowerCase();
        if(!user) return;
        const snap = await db.collection('users').where('username', '==', user).get();
        if(snap.empty) return toast("Пользователь не найден");
        const target = snap.docs[0].data();
        document.getElementById('modal-overlay').style.display='none';
        startChatWith(target);
    }

    // Settings
    function loadSettings() {
        document.getElementById('set-photo').src = me.photoURL;
        document.getElementById('set-name').innerText = me.name;
        document.getElementById('set-user').innerText = me.username;
        document.getElementById('edit-name').value = me.name;
        document.getElementById('edit-user').value = me.username;
    }

    async function updateProfileData() {
        const name = document.getElementById('edit-name').value.trim();
        const user = document.getElementById('edit-user').value.trim().toLowerCase();
        if(!name || !user) return toast("Заполните поля");

        if(user !== me.username) {
            toast("Проверка username...");
            const snap = await db.collection('users').where('username', '==', user).get();
            if(!snap.empty) return toast("Username занят");
        }

        toast("Сохранение...");
        await db.collection('users').doc(me.uid).update({ name, username: user });
        me.name = name; me.username = user;
        loadSettings();
        toast("Данные обновлены");
    }

    async function updatePhoto(file) {
        if(!file) return;
        toast("Загрузка фото...");
        const ref = storage.ref(`avatars/${me.uid}`);
        await ref.put(file);
        const url = await ref.getDownloadURL();
        await db.collection('users').doc(me.uid).update({ photoURL: url });
        me.photoURL = url;
        loadSettings();
    }

    function setTheme(t) {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('run-theme', t);
    }

    function handleLogout() {
        if(confirm("Выйти?")) auth.signOut();
    }

    function toast(txt) {
        const t = document.getElementById('toast');
        t.innerText = txt;
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // Apply saved theme
    const savedTheme = localStorage.getItem('run-theme');
    if(savedTheme) setTheme(savedTheme);
</script>

</body>
</html>

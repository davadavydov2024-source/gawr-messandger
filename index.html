<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAWR Messenger</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f1113;
            --sidebar: #171a1d;
            --surface: #202329;
            --accent: #248bf5;
            --text: #ffffff;
            --text-dim: #949ba4;
            --sent: #2b5278;
            --received: #182533;
            --border: #313338;
        }

        [data-theme="light"] {
            --bg: #f0f2f5;
            --sidebar: #ffffff;
            --surface: #f0f2f5;
            --accent: #0084ff;
            --text: #1c1e21;
            --text-dim: #65676b;
            --sent: #0084ff;
            --received: #e4e6eb;
            --border: #dddfe2;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }

        /* Auth UI */
        #auth-container { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .auth-card { background: var(--sidebar); width: 100%; max-width: 400px; padding: 30px; border-radius: 16px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .auth-card h2 { margin: 0 0 20px; text-align: center; }
        .auth-input { width: 100%; padding: 12px 15px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .auth-btn:hover { opacity: 0.9; }
        .auth-toggle { text-align: center; margin-top: 15px; font-size: 14px; color: var(--text-dim); cursor: pointer; }
        .error { color: #ff4d4d; font-size: 13px; margin-bottom: 10px; text-align: center; }

        /* Layout */
        #app { display: none; height: 100vh; grid-template-columns: 350px 1fr; }
        @media (max-width: 768px) { #app { grid-template-columns: 1fr; } }

        /* Sidebar */
        .sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .avatar-small { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #444; }
        .search-bar { padding: 10px 15px; }
        .search-bar input { width: 100%; padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.1s; }
        .chat-item:hover { background: var(--surface); }
        .chat-item.active { background: var(--surface); border-left: 3px solid var(--accent); }
        .chat-item-info { flex: 1; min-width: 0; }
        .chat-item-name { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-item-msg { font-size: 13px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Chat Window */
        .chat-window { display: flex; flex-direction: column; background: var(--bg); position: relative; }
        .chat-header { padding: 12px 20px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 15px; z-index: 10; }
        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 70%; padding: 10px 14px; border-radius: 14px; position: relative; font-size: 15px; word-wrap: break-word; }
        .message.sent { align-self: flex-end; background: var(--sent); color: #fff; border-bottom-right-radius: 2px; }
        .message.received { align-self: flex-start; background: var(--received); border-bottom-left-radius: 2px; }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 5px; text-align: right; }
        .message img { max-width: 100%; border-radius: 8px; margin-top: 5px; }
        
        /* Input Area */
        .input-area { padding: 15px 20px; background: var(--sidebar); display: flex; align-items: center; gap: 15px; border-top: 1px solid var(--border); }
        .input-area input { flex: 1; padding: 12px 18px; background: var(--surface); border: 1px solid var(--border); border-radius: 25px; color: var(--text); outline: none; }
        .icon-btn { color: var(--accent); font-size: 20px; cursor: pointer; transition: 0.2s; }
        .icon-btn:hover { transform: scale(1.1); }
        
        /* Modals / Settings */
        #settings-screen { position: absolute; inset: 0; background: var(--bg); z-index: 100; display: none; flex-direction: column; padding: 20px; }
        .settings-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .profile-upload { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        .profile-upload img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .profile-upload .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: 0.3s; cursor: pointer; }
        .profile-upload:hover .overlay { opacity: 1; }

        /* Nav */
        .bottom-nav { height: 60px; background: var(--sidebar); border-top: 1px solid var(--border); display: none; justify-content: space-around; align-items: center; }
        @media (max-width: 768px) {
            .bottom-nav { display: flex; }
            .sidebar { position: absolute; inset: 0; z-index: 50; }
            #app.chat-active .sidebar { display: none; }
            #app.chat-active .chat-window { display: flex; }
            .chat-window { display: none; width: 100%; height: calc(100% - 60px); }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="auth-container">
        <div class="auth-card" id="email-auth">
            <h2 id="auth-title">Вход</h2>
            <div id="auth-error-msg" class="error"></div>
            <input type="text" id="user-name" class="auth-input" placeholder="Имя (только для регистрации)" style="display:none;">
            <input type="email" id="user-email" class="auth-input" placeholder="Email">
            <input type="password" id="user-pass" class="auth-input" placeholder="Пароль">
            <button class="auth-btn" onclick="handleEmailAuth()">Продолжить</button>
            <div class="auth-toggle" onclick="toggleAuthMode()">Нет аккаунта? Регистрация</div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid var(--border);">
            <div id="recaptcha-container"></div>
            <button class="auth-btn" style="background:#313338" onclick="showPhoneAuth()">Войти по номеру телефона</button>
        </div>

        <div class="auth-card" id="phone-auth" style="display:none;">
            <h2>Вход по телефону</h2>
            <div id="phone-error-msg" class="error"></div>
            <input type="tel" id="user-phone" class="auth-input" placeholder="+79001234567">
            <button class="auth-btn" id="send-code-btn" onclick="sendSMS()">Отправить код</button>
            <div id="otp-group" style="display:none; margin-top:15px;">
                <input type="number" id="sms-code" class="auth-input" placeholder="Код из SMS">
                <button class="auth-btn" onclick="verifySMS()">Проверить код</button>
            </div>
            <div class="auth-toggle" onclick="backToEmail()">Назад к Email</div>
        </div>
    </div>

    <div id="app">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="user-info">
                    <img id="my-avatar" class="avatar-small" src="" alt="">
                    <span id="my-name" style="font-weight:bold">Загрузка...</span>
                </div>
                <i class="fa-solid fa-gear icon-btn" onclick="toggleSettings(true)"></i>
            </div>
            <div class="search-bar">
                <input type="text" id="search-user" placeholder="Поиск пользователей по ID или Email..." onkeypress="handleSearch(event)">
            </div>
            <div class="chat-list" id="chat-list-ui">
                </div>
        </div>

        <div class="chat-window" id="chat-window-ui">
            <div id="no-chat-selected" style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:var(--text-dim)">
                <i class="fa-solid fa-comments" style="font-size:60px; margin-bottom:20px"></i>
                Выберите чат, чтобы начать общение
            </div>

            <div id="active-chat" style="display:none; flex-direction:column; height:100%;">
                <div class="chat-header">
                    <i class="fa-solid fa-arrow-left icon-btn" style="display:none" id="back-btn" onclick="closeChat()"></i>
                    <img id="active-chat-avatar" class="avatar-small" src="">
                    <div>
                        <div id="active-chat-name" style="font-weight:bold"></div>
                        <div id="active-chat-status" style="font-size:12px; color:var(--text-dim)">online</div>
                    </div>
                </div>
                <div class="messages" id="messages-container"></div>
                <div class="input-area">
                    <input type="file" id="img-upload" style="display:none;" accept="image/*" onchange="uploadImage(this)">
                    <i class="fa-solid fa-image icon-btn" onclick="document.getElementById('img-upload').click()"></i>
                    <input type="text" id="message-input" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <i class="fa-solid fa-paper-plane icon-btn" onclick="sendMessage()"></i>
                </div>
            </div>

            <div id="settings-screen">
                <div class="settings-header">
                    <i class="fa-solid fa-arrow-left icon-btn" onclick="toggleSettings(false)"></i>
                    <h2 style="margin:0">Настройки</h2>
                </div>
                <div class="profile-upload">
                    <img id="settings-avatar" src="">
                    <label class="overlay" for="avatar-input">
                        <i class="fa-solid fa-camera"></i>
                    </label>
                    <input type="file" id="avatar-input" style="display:none" accept="image/*" onchange="updateAvatar(this)">
                </div>
                <div style="max-width:400px; margin: 0 auto; width:100%">
                    <label style="color:var(--text-dim); font-size:12px">Ваше имя</label>
                    <input type="text" id="settings-name" class="auth-input">
                    <button class="auth-btn" onclick="saveProfile()" style="margin-bottom:20px">Сохранить</button>
                    
                    <button class="auth-btn" onclick="toggleTheme()" style="background:var(--surface); color:var(--text); margin-bottom:10px">Сменить тему</button>
                    <button class="auth-btn" onclick="logout()" style="background:#ff4d4d">Выйти</button>
                    
                    <div style="margin-top:30px; padding:15px; background:var(--surface); border-radius:10px; font-size:12px;">
                        <p>Ваш ID: <br><span id="my-uid-copy" style="color:var(--accent)">...</span></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-link" onclick="closeChat()"><i class="fa-solid fa-message"></i></div>
            <div class="nav-link" onclick="toggleSettings(true)"><i class="fa-solid fa-user"></i></div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE INIT ---
        const firebaseConfig = {
            apiKey: "AIzaSyAbfPtl2auXZeiFlTBgrw5HUR742SlBM88",
            authDomain: "gawr-69377.firebaseapp.com",
            databaseURL: "https://gawr-69377-default-rtdb.firebaseio.com",
            projectId: "gawr-69377",
            storageBucket: "gawr-69377.firebasestorage.app",
            messagingSenderId: "89649220321",
            appId: "1:89649220321:web:479e1aa4ee08517a5cc5a0",
            measurementId: "G-B9QNGMXCTT"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let activeChatId = null;
        let isRegister = false;
        let phoneConfirmation = null;

        // --- 2. AUTH LOGIC ---
        function toggleAuthMode() {
            isRegister = !isRegister;
            document.getElementById('auth-title').innerText = isRegister ? 'Регистрация' : 'Вход';
            document.getElementById('user-name').style.display = isRegister ? 'block' : 'none';
            document.querySelector('.auth-toggle').innerText = isRegister ? 'Уже есть аккаунт? Вход' : 'Нет аккаунта? Регистрация';
        }

        async function handleEmailAuth() {
            const email = document.getElementById('user-email').value;
            const pass = document.getElementById('user-pass').value;
            const name = document.getElementById('user-name').value;
            const errDiv = document.getElementById('auth-error-msg');
            errDiv.innerText = '';

            try {
                if (isRegister) {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await db.collection('users').doc(res.user.uid).set({
                        uid: res.user.uid,
                        email: email,
                        name: name || email.split('@')[0],
                        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + res.user.uid,
                        lastSeen: Date.now()
                    });
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch (e) { errDiv.innerText = e.message; }
        }

        function showPhoneAuth() {
            document.getElementById('email-auth').style.display = 'none';
            document.getElementById('phone-auth').style.display = 'block';
            window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
        }

        function backToEmail() {
            document.getElementById('email-auth').style.display = 'block';
            document.getElementById('phone-auth').style.display = 'none';
        }

        async function sendSMS() {
            const phone = document.getElementById('user-phone').value;
            try {
                phoneConfirmation = await auth.signInWithPhoneNumber(phone, window.recaptchaVerifier);
                document.getElementById('otp-group').style.display = 'block';
                document.getElementById('send-code-btn').style.display = 'none';
            } catch (e) { alert(e.message); }
        }

        async function verifySMS() {
            const code = document.getElementById('sms-code').value;
            try {
                const res = await phoneConfirmation.confirm(code);
                const userDoc = await db.collection('users').doc(res.user.uid).get();
                if (!userDoc.exists) {
                    await db.collection('users').doc(res.user.uid).set({
                        uid: res.user.uid,
                        phone: res.user.phoneNumber,
                        name: 'User ' + res.user.uid.slice(0,5),
                        avatar: 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + res.user.uid,
                        lastSeen: Date.now()
                    });
                }
            } catch (e) { alert("Неверный код"); }
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('auth-container').style.display = 'none';
                document.getElementById('app').style.display = 'grid';
                loadMyProfile();
                listenToChats();
            } else {
                document.getElementById('auth-container').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });

        // --- 3. PROFILE & SETTINGS ---
        async function loadMyProfile() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const data = doc.data();
            document.getElementById('my-name').innerText = data.name;
            document.getElementById('my-avatar').src = data.avatar;
            document.getElementById('settings-avatar').src = data.avatar;
            document.getElementById('settings-name').value = data.name;
            document.getElementById('my-uid-copy').innerText = currentUser.uid;
        }

        async function updateAvatar(input) {
            const file = input.files[0];
            if (!file) return;
            const ref = storage.ref(`avatars/${currentUser.uid}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('users').doc(currentUser.uid).update({ avatar: url });
            loadMyProfile();
        }

        async function saveProfile() {
            const newName = document.getElementById('settings-name').value;
            await db.collection('users').doc(currentUser.uid).update({ name: newName });
            loadMyProfile();
            alert("Профиль обновлен");
        }

        function toggleTheme() {
            const b = document.body;
            const isDark = b.getAttribute('data-theme') === 'dark';
            b.setAttribute('data-theme', isDark ? 'light' : 'dark');
        }

        function logout() { auth.signOut(); }

        function toggleSettings(show) {
            document.getElementById('settings-screen').style.display = show ? 'flex' : 'none';
        }

        // --- 4. CHAT LOGIC ---
        function listenToChats() {
            db.collection('chats')
                .where('members', 'array-contains', currentUser.uid)
                .onSnapshot(snap => {
                    const listUi = document.getElementById('chat-list-ui');
                    listUi.innerHTML = '';
                    snap.forEach(async doc => {
                        const chat = doc.data();
                        const otherUid = chat.members.find(id => id !== currentUser.uid);
                        const otherUser = (await db.collection('users').doc(otherUid).get()).data();
                        
                        const div = document.createElement('div');
                        div.className = `chat-item ${activeChatId === doc.id ? 'active' : ''}`;
                        div.onclick = () => openChat(doc.id, otherUser);
                        div.innerHTML = `
                            <img src="${otherUser.avatar}" class="avatar-small">
                            <div class="chat-item-info">
                                <div class="chat-item-name">${otherUser.name}</div>
                                <div class="chat-item-msg">${chat.lastMessage || 'Нет сообщений'}</div>
                            </div>
                        `;
                        listUi.appendChild(div);
                    });
                });
        }

        async function handleSearch(e) {
            if (e.key !== 'Enter') return;
            const query = e.target.value.trim();
            if (!query) return;

            let targetUser = null;
            // Поиск по UID
            const byUid = await db.collection('users').doc(query).get();
            if (byUid.exists) targetUser = byUid.data();
            
            // Если не нашли, поиск по Email
            if (!targetUser) {
                const byEmail = await db.collection('users').where('email', '==', query).get();
                if (!byEmail.empty) targetUser = byEmail.docs[0].data();
            }

            if (targetUser && targetUser.uid !== currentUser.uid) {
                const chatId = currentUser.uid < targetUser.uid ? 
                    `${currentUser.uid}_${targetUser.uid}` : `${targetUser.uid}_${currentUser.uid}`;
                
                await db.collection('chats').doc(chatId).set({
                    members: [currentUser.uid, targetUser.uid],
                    lastMessage: '',
                    updatedAt: Date.now()
                }, {merge: true});
                
                openChat(chatId, targetUser);
                e.target.value = '';
            } else {
                alert("Пользователь не найден");
            }
        }

        let unsubscribeMessages = null;

        function openChat(chatId, otherUser) {
            activeChatId = chatId;
            document.getElementById('no-chat-selected').style.display = 'none';
            document.getElementById('active-chat').style.display = 'flex';
            document.getElementById('active-chat-name').innerText = otherUser.name;
            document.getElementById('active-chat-avatar').src = otherUser.avatar;
            document.getElementById('app').classList.add('chat-active');
            
            if (window.innerWidth <= 768) document.getElementById('back-btn').style.display = 'block';

            if (unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(snap => {
                    const container = document.getElementById('messages-container');
                    container.innerHTML = '';
                    snap.forEach(doc => {
                        const m = doc.data();
                        const isMe = m.sender === currentUser.uid;
                        const msgDiv = document.createElement('div');
                        msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
                        msgDiv.oncontextmenu = (e) => {
                            e.preventDefault();
                            if(confirm("Удалить сообщение для себя?")) doc.ref.delete();
                        };

                        let content = m.text ? `<div>${m.text}</div>` : '';
                        if (m.imageUrl) content += `<img src="${m.imageUrl}" onclick="window.open('${m.imageUrl}')">`;
                        
                        msgDiv.innerHTML = `
                            ${content}
                            <div class="message-time">${new Date(m.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>
                        `;
                        container.appendChild(msgDiv);
                    });
                    container.scrollTop = container.scrollHeight;
                });
        }

        function closeChat() {
            document.getElementById('app').classList.remove('chat-active');
            activeChatId = null;
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !activeChatId) return;

            const msgData = {
                sender: currentUser.uid,
                text: text,
                timestamp: Date.now()
            };

            input.value = '';
            await db.collection('chats').doc(activeChatId).collection('messages').add(msgData);
            await db.collection('chats').doc(activeChatId).update({
                lastMessage: text,
                updatedAt: Date.now()
            });
        }

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file || !activeChatId) return;
            
            const ref = storage.ref(`chats/${activeChatId}/${Date.now()}_${file.name}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();

            await db.collection('chats').doc(activeChatId).collection('messages').add({
                sender: currentUser.uid,
                imageUrl: url,
                timestamp: Date.now()
            });
            await db.collection('chats').doc(activeChatId).update({
                lastMessage: '📷 Фотография',
                updatedAt: Date.now()
            });
            input.value = '';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GAWR">
    <meta name="theme-color" content="#000000">
    
    <link rel="apple-touch-icon" href="https://api.dicebear.com/7.x/shapes/svg?seed=GawrApp&backgroundColor=000000">
    
    <link rel="manifest" href="data:application/json;charset=utf-8,%7B%22name%22%3A%22GAWR%20Messenger%22%2C%22short_name%22%3A%22GAWR%22%2C%22start_url%22%3A%22.%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23ff0000%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22https%3A%2F%2Fapi.dicebear.com%2F7.x%2Fshapes%2Fsvg%3Fseed%3DGawrApp%26backgroundColor%3D000000%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%7D%5D%7D">

    <title>GAWR PRO</title>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --theme: #ff0000;
            --bg: #050505;
            --surface: #111;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden; /* Запрет скролла всей страницы */
            overscroll-behavior-y: none; /* Запрет эффекта "резинки" на iOS */
        }

        /* Экраны */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column;
            background: var(--bg);
            padding-top: env(safe-area-inset-top); /* Для челки iPhone */
            padding-bottom: env(safe-area-inset-bottom);
        }
        .screen.active { display: flex; }

        /* HEADER */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.8);
            border-bottom: 1px solid var(--theme);
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
            backdrop-filter: blur(10px); z-index: 10;
        }
        .header h1 { margin: 0; font-size: 22px; font-weight: 900; color: var(--theme); letter-spacing: 2px; }
        .icon-btn { cursor: pointer; color: var(--theme); display: flex; align-items: center; }

        /* СПИСОК ЧАТОВ (HUB) */
        .chat-list { flex: 1; overflow-y: auto; padding: 15px; }
        .chat-item {
            display: flex; align-items: center; gap: 15px;
            padding: 15px; background: var(--surface);
            border-radius: 15px; margin-bottom: 10px;
            border: 1px solid #222;
        }
        .chat-avatar { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--theme); }
        .chat-info { flex: 1; }
        .chat-name { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .chat-last-msg { font-size: 13px; color: #888; }

        /* ОКНО ЧАТА (ROOM) */
        .messages-area {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 12px;
        }
        .msg-bubble {
            max-width: 75%; padding: 12px 16px; font-size: 15px; line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }
        .msg-received {
            align-self: flex-start; background: #222;
            border-radius: 18px 18px 18px 2px; border: 1px solid #333;
        }
        .msg-sent {
            align-self: flex-end; background: var(--theme); color: #000;
            border-radius: 18px 18px 2px 18px; font-weight: 500;
        }

        /* ПОЛЕ ВВОДА */
        .input-area {
            padding: 15px 20px; background: #0a0a0a;
            display: flex; gap: 10px; align-items: center;
            border-top: 1px solid #222;
        }
        .chat-input {
            flex: 1; background: #1a1a1a; border: 1px solid #333;
            color: #fff; padding: 14px 20px; border-radius: 25px;
            font-size: 16px; outline: none;
        }
        .chat-input:focus { border-color: var(--theme); }
        .send-btn {
            width: 46px; height: 46px; border-radius: 50%;
            background: var(--theme); border: none;
            display: flex; align-items: center; justify-content: center;
            color: #000; cursor: pointer;
        }

        /* ЭКРАН ВХОДА */
        .auth-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .auth-input { width: 100%; background: none; border: none; border-bottom: 2px solid var(--theme); color: #fff; padding: 15px; font-size: 18px; margin-bottom: 30px; text-align: center; outline: none; }
        .auth-btn { width: 100%; background: var(--theme); color: #000; padding: 16px; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; text-transform: uppercase; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active">
        <div class="auth-container">
            <h1 style="font-size: 48px; color: var(--theme); margin: 0 0 10px 0; text-shadow: 0 0 20px rgba(255,0,0,0.5);">GAWR</h1>
            <p style="color: #666; margin-bottom: 50px;">Вход в систему</p>
            <input type="text" id="usernameInput" class="auth-input" placeholder="Придумай свой ник">
            <button class="auth-btn" onclick="login()">Войти</button>
        </div>
    </div>

    <div id="screen-hub" class="screen">
        <div class="header">
            <div class="icon-btn"><i data-lucide="settings"></i></div>
            <h1>GAWR</h1>
            <div class="icon-btn"><i data-lucide="search"></i></div>
        </div>
        <div class="chat-list">
            <div class="chat-item" onclick="openChat('Global Room')">
                <img src="https://api.dicebear.com/7.x/shapes/svg?seed=Global" class="chat-avatar">
                <div class="chat-info">
                    <div class="chat-name">Global Room</div>
                    <div class="chat-last-msg">Нажми, чтобы войти в чат...</div>
                </div>
                <i data-lucide="chevron-right" style="color: #444;"></i>
            </div>
            
            <div style="text-align: center; margin-top: 40px; color: #555; font-size: 14px;">
                Пока больше нет чатов.<br>Добавь приложение на главный экран!
            </div>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="header">
            <div class="icon-btn" onclick="goBack()"><i data-lucide="arrow-left"></i></div>
            <h1 id="chatTitle">Global Room</h1>
            <div class="icon-btn"><i data-lucide="more-vertical"></i></div>
        </div>
        
        <div class="messages-area" id="messagesArea">
            <div class="msg-bubble msg-received">Система: Привет! Это тестовый чат. Твои сообщения сохраняются локально.</div>
        </div>

        <div class="input-area">
            <input type="text" id="msgInput" class="chat-input" placeholder="Написать..." onkeypress="if(event.key === 'Enter') sendMsg()">
            <button class="send-btn" onclick="sendMsg()"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        // Проверка сессии при запуске
        window.onload = () => {
            const user = localStorage.getItem('gawr_user');
            if (user) {
                switchScreen('screen-hub');
                loadMessages();
            }
        };

        // Логика переключения экранов
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        function login() {
            const val = document.getElementById('usernameInput').value.trim();
            if(val) {
                localStorage.setItem('gawr_user', val);
                switchScreen('screen-hub');
            }
        }

        function openChat(name) {
            document.getElementById('chatTitle').innerText = name;
            switchScreen('screen-chat');
            scrollToBottom();
        }

        function goBack() {
            switchScreen('screen-hub');
        }

        // Логика сообщений
        function sendMsg() {
            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if(!text) return;

            // Рендер на экран
            addMessageToDOM(text, 'msg-sent');
            
            // Сохранение в память браузера (чтобы не пропадало)
            saveMessage(text);

            // Очистка
            input.value = '';
            scrollToBottom();
        }

        function addMessageToDOM(text, type) {
            const area = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = `msg-bubble ${type}`;
            div.innerText = text;
            area.appendChild(div);
        }

        function saveMessage(text) {
            let msgs = JSON.parse(localStorage.getItem('gawr_msgs') || '[]');
            msgs.push(text);
            localStorage.setItem('gawr_msgs', JSON.stringify(msgs));
        }

        function loadMessages() {
            let msgs = JSON.parse(localStorage.getItem('gawr_msgs') || '[]');
            msgs.forEach(text => addMessageToDOM(text, 'msg-sent'));
        }

        function scrollToBottom() {
            const area = document.getElementById('messagesArea');
            area.scrollTop = area.scrollHeight;
        }
    </script>
</body>
</html>

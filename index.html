<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RUN Messenger</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0f0f10;
            --card: #1a1a1c;
            --accent: #ff2a2a;
            --text: #ffffff;
            --text-dim: #a0a0a5;
            --border: #252528;
            --msg-in: #1e1e21;
            --msg-out: #ff2a2a;
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif;
            overflow: hidden; font-size: 16px;
        }

        /* --- AUTH SCREEN --- */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; overflow-y: auto;
        }
        .auth-card { width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 50px; font-weight: 900; color: var(--accent); letter-spacing: -2px; margin-bottom: 30px; }
        
        .upload-circle {
            width: 100px; height: 100px; border-radius: 50%; background: var(--card);
            margin: 0 auto 20px; border: 2px dashed var(--accent);
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            overflow: hidden; position: relative;
        }
        .upload-circle img { width: 100%; height: 100%; object-fit: cover; }
        .upload-circle i { font-size: 30px; color: var(--text-dim); }

        .input-box { width: 100%; margin-bottom: 15px; text-align: left; }
        .input-box label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 5px; text-transform: uppercase; font-weight: 700; }
        .run-input { 
            width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; color: white; font-size: 16px; transition: 0.2s;
        }
        .run-input:focus { border-color: var(--accent); }

        .btn { 
            width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: 800;
            cursor: pointer; font-size: 16px; text-transform: uppercase; transition: 0.3s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:active { transform: scale(0.98); opacity: 0.9; }

        .auth-link { margin-top: 20px; color: var(--text-dim); cursor: pointer; font-size: 14px; }
        .auth-link b { color: var(--accent); }

        /* --- MAIN APP --- */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        
        header {
            padding: calc(var(--safe-top) + 20px) 20px 15px;
            background: var(--bg); border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        header h1 { margin: 0; font-size: 24px; font-weight: 800; }

        .content { flex: 1; overflow-y: auto; position: relative; }

        /* NAV */
        nav {
            height: calc(70px + var(--safe-bottom)); background: var(--card);
            border-top: 1px solid var(--border); display: flex;
            padding-bottom: var(--safe-bottom);
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: var(--text-dim); cursor: pointer; gap: 4px;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 11px; font-weight: 600; }

        /* CHAT LIST / SEARCH */
        .item-row {
            display: flex; align-items: center; padding: 15px 20px;
            border-bottom: 1px solid var(--border); cursor: pointer;
        }
        .item-row:active { background: var(--card); }
        .avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; background: var(--border); flex-shrink: 0; }
        .item-body { flex: 1; margin-left: 15px; min-width: 0; }
        .item-head { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .item-name { font-weight: 700; font-size: 17px; }
        .item-time { font-size: 12px; color: var(--text-dim); }
        .item-msg { font-size: 14px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .verified { color: #00c8ff; font-size: 14px; margin-left: 4px; }

        /* --- CHAT OVERLAY --- */
        #chat-window {
            position: fixed; inset: 0; background: var(--bg); z-index: 1500;
            display: none; flex-direction: column;
        }
        #chat-window.active { display: flex; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }

        .chat-header {
            padding: calc(var(--safe-top) + 10px) 15px 10px;
            background: var(--card); display: flex; align-items: center; border-bottom: 1px solid var(--border);
        }
        .back-btn { font-size: 24px; padding: 10px; cursor: pointer; color: var(--accent); }
        
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px;
            background-image: radial-gradient(var(--border) 1px, transparent 0); background-size: 20px 20px;
        }

        .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; position: relative; font-size: 16px; line-height: 1.4; }
        .msg.sent { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
        .msg-time { font-size: 10px; opacity: 0.7; margin-top: 5px; text-align: right; }
        
        .msg img { max-width: 100%; border-radius: 10px; display: block; margin-top: 5px; }
        .video-circle { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); overflow: hidden; }
        audio { height: 35px; width: 200px; }

        .chat-input-area {
            padding: 10px 15px calc(var(--safe-bottom) + 10px);
            background: var(--card); border-top: 1px solid var(--border);
            display: flex; align-items: flex-end; gap: 10px;
        }
        .msg-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            border-radius: 24px; padding: 12px 18px; color: white; font-size: 16px;
            max-height: 120px; overflow-y: auto;
        }

        /* MEDIA CONTROLS */
        .media-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--accent); font-size: 20px; transition: 0.2s; }
        .media-btn:active { background: rgba(255,42,42,0.1); }
        .rec-active { color: #fff; background: var(--accent) !important; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* MODALS */
        #video-preview-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .preview-video-el { width: 300px; height: 300px; border-radius: 50%; object-fit: cover; border: 4px solid var(--accent); }

        /* SETTINGS */
        .settings-pane { padding: 20px; }
        .set-header { text-align: center; margin-bottom: 30px; }
        .set-avatar-big { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 3px solid var(--accent); }
        .set-item { 
            background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px;
            display: flex; align-items: center; justify-content: space-between; cursor: pointer;
        }
        .set-item i { color: var(--accent); font-size: 18px; margin-right: 15px; }

        #loader-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 4000;
            display: none; align-items: center; justify-content: center;
        }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,42,42,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* TOAST */
        #toast {
            position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 12px 25px; border-radius: 30px;
            font-weight: 700; font-size: 14px; z-index: 5000; display: none;
        }
    </style>
</head>
<body>

    <div id="loader-overlay"><div class="spinner"></div></div>
    <div id="toast">Ошибка</div>

    <div id="auth-screen">
        <div class="auth-card">
            <div class="logo">RUN</div>
            
            <div id="reg-form">
                <input type="file" id="auth-photo-input" hidden accept="image/*">
                <div class="upload-circle" onclick="document.getElementById('auth-photo-input').click()">
                    <img id="auth-photo-preview" style="display:none;">
                    <i class="fa-solid fa-camera"></i>
                </div>
                <div class="input-box">
                    <label>Имя</label>
                    <input type="text" id="reg-name" class="run-input" placeholder="Александр">
                </div>
                <div class="input-box">
                    <label>Username</label>
                    <input type="text" id="reg-username" class="run-input" placeholder="alex_run">
                </div>
                <div class="input-box">
                    <label>Email</label>
                    <input type="email" id="reg-email" class="run-input" placeholder="mail@example.com">
                </div>
                <div class="input-box">
                    <label>Пароль</label>
                    <input type="password" id="reg-pass" class="run-input" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleRegister()">Зарегистрироваться</button>
                <div class="auth-link" onclick="toggleAuth(false)">Уже есть аккаунт? <b>Войти</b></div>
            </div>

            <div id="login-form" style="display:none;">
                <div class="input-box">
                    <label>Email</label>
                    <input type="email" id="log-email" class="run-input" placeholder="mail@example.com">
                </div>
                <div class="input-box">
                    <label>Пароль</label>
                    <input type="password" id="log-pass" class="run-input" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" onclick="handleLogin()">Войти</button>
                <div class="auth-link" onclick="toggleAuth(true)">Нет аккаунта? <b>Создать</b></div>
            </div>
        </div>
    </div>

    <div id="main-app">
        <header>
            <h1 id="screen-title">Чаты</h1>
            <div id="admin-actions" style="display:none;">
                <i class="fa-solid fa-bullhorn" style="color:var(--accent); cursor:pointer;" onclick="adminBroadcast()"></i>
            </div>
        </header>

        <div class="content">
            <div id="screen-chats" class="screen">
                <div id="chats-container"></div>
            </div>

            <div id="screen-contacts" class="screen" style="display:none;">
                <div style="padding:15px;">
                    <input type="text" id="search-input" class="run-input" placeholder="Поиск по @username..." oninput="searchUsers(this.value)">
                </div>
                <div id="search-results"></div>
            </div>

            <div id="screen-settings" class="screen" style="display:none;">
                <div class="settings-pane">
                    <div class="set-header">
                        <img id="set-avatar" class="set-avatar-big" src="">
                        <h2 id="set-name-text">Имя</h2>
                        <div id="set-user-text" style="color:var(--text-dim);">@username</div>
                    </div>

                    <div class="set-item" onclick="changeField('name')">
                        <div><i class="fa-solid fa-user"></i> Изменить имя</div>
                        <i class="fa-solid fa-chevron-right" style="font-size:12px;"></i>
                    </div>
                    <div class="set-item" onclick="changeField('username')">
                        <div><i class="fa-solid fa-at"></i> Изменить username</div>
                        <i class="fa-solid fa-chevron-right" style="font-size:12px;"></i>
                    </div>
                    <div class="set-item" onclick="document.getElementById('update-photo-input').click()">
                        <input type="file" id="update-photo-input" hidden accept="image/*" onchange="updateProfilePhoto(this.files[0])">
                        <div><i class="fa-solid fa-image"></i> Сменить фото</div>
                        <i class="fa-solid fa-chevron-right" style="font-size:12px;"></i>
                    </div>
                    <div class="set-item" style="margin-top:30px; color:var(--accent);" onclick="handleLogout()">
                        <div><i class="fa-solid fa-right-from-bracket"></i> Выйти</div>
                    </div>
                </div>
            </div>
        </div>

        <nav>
            <div class="nav-item" onclick="switchTab('contacts')">
                <i class="fa-solid fa-user-group"></i>
                <span>Контакты</span>
            </div>
            <div class="nav-item active" onclick="switchTab('chats')">
                <i class="fa-solid fa-comment"></i>
                <span>Чаты</span>
            </div>
            <div class="nav-item" onclick="switchTab('settings')">
                <i class="fa-solid fa-gear"></i>
                <span>Настройки</span>
            </div>
        </nav>
    </div>

    <div id="chat-window">
        <div class="chat-header">
            <div class="back-btn" onclick="closeChat()"><i class="fa-solid fa-arrow-left"></i></div>
            <img id="chat-target-avatar" class="avatar" style="width:40px; height:40px; margin-left:10px;">
            <div style="margin-left:12px; flex:1;">
                <div id="chat-target-name" style="font-weight:700;">Имя</div>
                <div id="chat-target-status" style="font-size:12px; color:var(--text-dim);">в сети</div>
            </div>
        </div>

        <div class="chat-messages" id="chat-flow"></div>

        <div class="chat-input-area">
            <input type="file" id="chat-image-input" hidden accept="image/*" onchange="uploadFile(this.files[0], 'image')">
            <div class="media-btn" onclick="document.getElementById('chat-image-input').click()"><i class="fa-solid fa-paperclip"></i></div>
            
            <textarea id="msg-input" class="msg-input" rows="1" placeholder="Cообщение..." oninput="autoHeight(this)"></textarea>

            <div id="voice-btn" class="media-btn" ontouchstart="startVoice()" ontouchend="stopVoice()" onmousedown="startVoice()" onmouseup="stopVoice()"><i class="fa-solid fa-microphone"></i></div>
            <div id="video-btn" class="media-btn" onclick="startVideoCircle()"><i class="fa-solid fa-circle-play"></i></div>
            <div id="send-btn" class="media-btn" style="display:none;" onclick="sendText()"><i class="fa-solid fa-paper-plane"></i></div>
        </div>
    </div>

    <div id="video-preview-modal">
        <video id="v-preview" class="preview-video-el" autoplay muted playsinline></video>
        <div style="margin-top:30px; display:flex; gap:20px;">
            <button class="btn" style="width:120px; background:var(--card);" onclick="cancelVideo()">Отмена</button>
            <button id="v-record-btn" class="btn btn-primary" style="width:120px;" onclick="toggleVideoRecord()">Запись</button>
        </div>
    </div>

    <script>
        /* --- CONFIG --- */
        const firebaseConfig = {
            apiKey: "AIzaSyAbfPtl2auXZeiFlTBgrw5HUR742SlBM88",
            authDomain: "gawr-69377.firebaseapp.com",
            projectId: "gawr-69377",
            storageBucket: "gawr-69377.firebasestorage.app"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        let currentUser = null;
        let activeChatId = null;
        let targetUid = null;
        let unsubMessages = null;
        let unsubChats = null;

        /* --- AUTH LOGIC --- */
        document.getElementById('auth-photo-input').onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.getElementById('auth-photo-preview');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        };

        function toggleAuth(isReg) {
            document.getElementById('reg-form').style.display = isReg ? 'block' : 'none';
            document.getElementById('login-form').style.display = isReg ? 'none' : 'block';
        }

        async function handleRegister() {
            const name = document.getElementById('reg-name').value.trim();
            const username = document.getElementById('reg-username').value.trim().toLowerCase();
            const email = document.getElementById('reg-email').value.trim();
            const pass = document.getElementById('reg-pass').value;
            const file = document.getElementById('auth-photo-input').files[0];

            if(!name || !username || !email || !pass || !file) return showToast("Заполните все поля и выберите фото");

            showLoader(true);
            try {
                // Check username
                const check = await db.collection('users').where('username', '==', username).get();
                if(!check.empty) throw new Error("Username уже занят");

                const cred = await auth.createUserWithEmailAndPassword(email, pass);
                const uid = cred.user.uid;

                const ref = storage.ref(`avatars/${uid}`);
                await ref.put(file);
                const photoURL = await ref.getDownloadURL();

                const role = (email === "robuxofficial2000@gmail.com") ? "admin" : "user";

                await db.collection('users').doc(uid).set({
                    uid, name, username, email, photoURL, role,
                    createdAt: Date.now(), lastSeen: Date.now()
                });

                // Init RUN-BOT chat
                await createRunBotChat(uid);

            } catch(e) { showToast(e.message); }
            showLoader(false);
        }

        async function handleLogin() {
            const email = document.getElementById('log-email').value.trim();
            const pass = document.getElementById('log-pass').value;
            if(!email || !pass) return showToast("Заполните поля");

            showLoader(true);
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch(e) { showToast(e.message); }
            showLoader(false);
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                currentUser = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'flex';
                loadUserData();
                listenChats();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        /* --- USER DATA --- */
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            const data = doc.data();
            document.getElementById('set-name-text').innerText = data.name;
            document.getElementById('set-user-text').innerText = `@${data.username}`;
            document.getElementById('set-avatar').src = data.photoURL;

            if(data.role === "admin") {
                document.getElementById('admin-actions').style.display = 'block';
            }
        }

        async function createRunBotChat(uid) {
            await db.collection('chats').doc(`run-bot_${uid}`).set({
                participants: ["run-bot", uid],
                lastActivity: Date.now(),
                lastMessage: "Добро пожаловать в RUN!"
            });
        }

        /* --- SCREEN LOGIC --- */
        function switchTab(tab) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(`screen-${tab}`).style.display = 'block';
            event.currentTarget.classList.add('active');
            
            const titles = { chats: "Чаты", contacts: "Поиск", settings: "Настройки" };
            document.getElementById('screen-title').innerText = titles[tab];
        }

        /* --- SEARCH --- */
        async function searchUsers(val) {
            const results = document.getElementById('search-results');
            if(!val) { results.innerHTML = ''; return; }

            const snap = await db.collection('users')
                .where('username', '>=', val.toLowerCase())
                .where('username', '<=', val.toLowerCase() + '\uf8ff')
                .limit(10).get();

            results.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                if(u.uid === currentUser.uid) return;
                const div = document.createElement('div');
                div.className = 'item-row';
                div.onclick = () => openPrivateChat(u);
                div.innerHTML = `
                    <img src="${u.photoURL}" class="avatar">
                    <div class="item-body">
                        <div class="item-name">${u.name}</div>
                        <div class="item-msg">@${u.username}</div>
                    </div>
                `;
                results.appendChild(div);
            });
        }

        /* --- CHAT ENGINE --- */
        function listenChats() {
            if(unsubChats) unsubChats();
            unsubChats = db.collection('chats')
                .where('participants', 'array-contains', currentUser.uid)
                .orderBy('lastActivity', 'desc')
                .onSnapshot(snap => {
                    renderChatList(snap);
                });
        }

        async function renderChatList(snap) {
            const container = document.getElementById('chats-container');
            container.innerHTML = '';

            for (const doc of snap.docs) {
                const chat = doc.data();
                const otherUid = chat.participants.find(id => id !== currentUser.uid);
                
                let info = { name: "RUN-BOT", photo: "https://cdn-icons-png.flaticon.com/512/4712/4712109.png", verified: true };
                
                if(otherUid !== "run-bot") {
                    const uDoc = await db.collection('users').doc(otherUid).get();
                    const uData = uDoc.data();
                    if(!uData) continue;
                    info = { name: uData.name, photo: uData.photoURL, verified: false, data: uData };
                }

                const time = chat.lastActivity ? new Date(chat.lastActivity).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

                const div = document.createElement('div');
                div.className = 'item-row';
                div.onclick = () => {
                    if(otherUid === "run-bot") openBotChat();
                    else openPrivateChat(info.data);
                };
                div.innerHTML = `
                    <img src="${info.photo}" class="avatar">
                    <div class="item-body">
                        <div class="item-head">
                            <span class="item-name">${info.name} ${info.verified ? '<i class="fa-solid fa-circle-check verified"></i>' : ''}</span>
                            <span class="item-time">${time}</span>
                        </div>
                        <div class="item-msg">${chat.lastMessage}</div>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function openBotChat() {
            targetUid = "run-bot";
            activeChatId = `run-bot_${currentUser.uid}`;
            document.getElementById('chat-target-name').innerHTML = 'RUN-BOT <i class="fa-solid fa-circle-check verified"></i>';
            document.getElementById('chat-target-avatar').src = "https://cdn-icons-png.flaticon.com/512/4712/4712109.png";
            document.getElementById('chat-target-status').innerText = "Официальный бот";
            startChat();
        }

        async function openPrivateChat(user) {
            targetUid = user.uid;
            activeChatId = currentUser.uid < user.uid ? `${currentUser.uid}_${user.uid}` : `${user.uid}_${currentUser.uid}`;
            document.getElementById('chat-target-name').innerText = user.name;
            document.getElementById('chat-target-avatar').src = user.photoURL;
            document.getElementById('chat-target-status').innerText = "в сети";
            
            await db.collection('chats').doc(activeChatId).set({
                participants: [currentUser.uid, user.uid],
                lastActivity: Date.now()
            }, { merge: true });

            startChat();
        }

        function startChat() {
            document.getElementById('chat-window').classList.add('active');
            const flow = document.getElementById('chat-flow');
            flow.innerHTML = '';

            if(unsubMessages) unsubMessages();
            unsubMessages = db.collection('messages')
                .where('chatId', '==', activeChatId)
                .orderBy('createdAt', 'asc')
                .onSnapshot(snap => {
                    snap.docChanges().forEach(change => {
                        if (change.type === 'added') appendMsg(change.doc.data());
                    });
                });
        }

        function appendMsg(msg) {
            const flow = document.getElementById('chat-flow');
            const isMe = msg.senderId === currentUser.uid;
            const div = document.createElement('div');
            div.className = `msg ${isMe ? 'sent' : 'received'}`;
            
            const time = new Date(msg.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            
            let content = '';
            if(msg.type === 'text') content = `<div>${msg.text}</div>`;
            if(msg.type === 'image') content = `<img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')">`;
            if(msg.type === 'audio') content = `<audio controls src="${msg.fileUrl}"></audio>`;
            if(msg.type === 'video') content = `<video class="video-circle" controls src="${msg.fileUrl}"></video>`;

            div.innerHTML = `${content}<div class="msg-time">${time}</div>`;
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight;
        }

        function closeChat() {
            document.getElementById('chat-window').classList.remove('active');
            activeChatId = null;
            if(unsubMessages) unsubMessages();
        }

        /* --- MESSAGE SENDING --- */
        async function sendText() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if(!text) return;
            
            input.value = '';
            autoHeight(input);
            toggleButtons(false);

            await db.collection('messages').add({
                chatId: activeChatId,
                senderId: currentUser.uid,
                type: 'text',
                text: text,
                createdAt: Date.now()
            });

            updateLastMsg(text);
        }

        async function uploadFile(file, type) {
            if(!file) return;
            showLoader(true);
            try {
                const name = `${Date.now()}_${file.name || 'file'}`;
                const ref = storage.ref(`chats/${activeChatId}/${name}`);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                await db.collection('messages').add({
                    chatId: activeChatId,
                    senderId: currentUser.uid,
                    type: type,
                    fileUrl: url,
                    createdAt: Date.now()
                });

                updateLastMsg(type === 'image' ? '📷 Фото' : (type === 'audio' ? '🎤 Голосовое' : '📹 Видео'));
            } catch(e) { showToast("Ошибка загрузки"); }
            showLoader(false);
        }

        async function updateLastMsg(txt) {
            await db.collection('chats').doc(activeChatId).update({
                lastMessage: txt,
                lastActivity: Date.now()
            });
        }

        /* --- AUDIO RECORDING --- */
        let recorder;
        let audioChunks = [];

        async function startVoice() {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            recorder = new MediaRecorder(stream);
            audioChunks = [];
            recorder.ondataavailable = e => audioChunks.push(e.data);
            recorder.onstop = () => {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                uploadFile(blob, 'audio');
                stream.getTracks().forEach(t => t.stop());
            };
            recorder.start();
            document.getElementById('voice-btn').classList.add('rec-active');
        }

        function stopVoice() {
            if(recorder) {
                recorder.stop();
                document.getElementById('voice-btn').classList.remove('rec-active');
            }
        }

        /* --- VIDEO CIRCLES --- */
        let videoStream;
        let videoRecorder;
        let videoChunks = [];

        async function startVideoCircle() {
            const modal = document.getElementById('video-preview-modal');
            modal.style.display = 'flex';
            videoStream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 400 }, audio: true });
            document.getElementById('v-preview').srcObject = videoStream;
        }

        function toggleVideoRecord() {
            const btn = document.getElementById('v-record-btn');
            if(btn.innerText === "Запись") {
                videoChunks = [];
                videoRecorder = new MediaRecorder(videoStream);
                videoRecorder.ondataavailable = e => videoChunks.push(e.data);
                videoRecorder.start();
                btn.innerText = "Стоп";
                btn.style.background = "#fff";
                btn.style.color = "var(--accent)";
            } else {
                videoRecorder.stop();
                videoRecorder.onstop = () => {
                    const blob = new Blob(videoChunks, { type: 'video/webm' });
                    uploadFile(blob, 'video');
                    cancelVideo();
                };
            }
        }

        function cancelVideo() {
            if(videoStream) videoStream.getTracks().forEach(t => t.stop());
            document.getElementById('video-preview-modal').style.display = 'none';
            document.getElementById('v-record-btn').innerText = "Запись";
            document.getElementById('v-record-btn').style.background = "var(--accent)";
            document.getElementById('v-record-btn').style.color = "#fff";
        }

        /* --- ADMIN BROADCAST --- */
        async function adminBroadcast() {
            const msg = prompt("Сообщение для всех пользователей:");
            if(!msg) return;

            showLoader(true);
            const users = await db.collection('users').get();
            const batch = db.batch();

            users.forEach(uDoc => {
                const cid = `run-bot_${uDoc.id}`;
                const mRef = db.collection('messages').doc();
                batch.set(mRef, {
                    chatId: cid,
                    senderId: "run-bot",
                    type: 'text',
                    text: msg,
                    createdAt: Date.now()
                });
                batch.update(db.collection('chats').doc(cid), {
                    lastMessage: msg,
                    lastActivity: Date.now()
                });
            });

            await batch.commit();
            showLoader(false);
            showToast("Отправлено всем!");
        }

        /* --- UTILS --- */
        function autoHeight(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
            toggleButtons(el.value.length > 0);
        }

        function toggleButtons(isTyping) {
            document.getElementById('voice-btn').style.display = isTyping ? 'none' : 'flex';
            document.getElementById('video-btn').style.display = isTyping ? 'none' : 'flex';
            document.getElementById('send-btn').style.display = isTyping ? 'flex' : 'none';
        }

        function showLoader(show) { document.getElementById('loader-overlay').style.display = show ? 'flex' : 'none'; }
        
        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function updateProfilePhoto(file) {
            if(!file) return;
            showLoader(true);
            const ref = storage.ref(`avatars/${currentUser.uid}`);
            await ref.put(file);
            const url = await ref.getDownloadURL();
            await db.collection('users').doc(currentUser.uid).update({ photoURL: url });
            loadUserData();
            showLoader(false);
        }

        async function changeField(type) {
            const val = prompt(`Введите новое ${type === 'name' ? 'имя' : 'username'}:`);
            if(!val) return;
            
            showLoader(true);
            try {
                if(type === 'username') {
                    const check = await db.collection('users').where('username', '==', val.toLowerCase()).get();
                    if(!check.empty) throw new Error("Занято");
                    await db.collection('users').doc(currentUser.uid).update({ username: val.toLowerCase() });
                } else {
                    await db.collection('users').doc(currentUser.uid).update({ name: val });
                }
                loadUserData();
            } catch(e) { showToast(e.message); }
            showLoader(false);
        }

        function handleLogout() {
            if(confirm("Выйти?")) auth.signOut();
        }
    </script>
</body>
</html>

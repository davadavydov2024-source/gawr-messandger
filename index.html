<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>GAWR OS V3</title>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        /* --- ДИЗАЙН-СИСТЕМА GAWR (НЕОН + КИБЕРПАНК) --- */
        :root {
            --neon: #ff0000;
            --neon-glow: rgba(255, 0, 0, 0.7);
            --bg: #030000;
            --surface: #0a0a0a;
            --glass: rgba(20, 0, 0, 0.8);
            --text: #ffffff;
            --accent: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body, html {
            margin: 0; padding: 0; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Глобальные стили для скролла */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        /* Экраны */
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column;
            background: var(--bg);
            z-index: 10;
            padding-top: env(safe-area-inset-top);
        }
        .screen.active { display: flex; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        /* --- КОМПОНЕНТЫ --- */
        .gawr-header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--neon);
            box-shadow: 0 0 20px var(--neon-glow);
            background: var(--glass); backdrop-filter: blur(15px);
        }
        .gawr-header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        /* ВХОД / РЕГИСТРАЦИЯ */
        .auth-box {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
        }
        .phone-input-container {
            width: 100%; max-width: 350px; margin-top: 30px;
        }
        .g-input {
            width: 100%; background: #111; border: 1px solid #300; border-radius: 12px;
            padding: 18px; color: white; font-size: 18px; margin-bottom: 15px;
            transition: 0.3s; box-shadow: inset 0 0 10px #000;
        }
        .g-input:focus { border-color: var(--neon); box-shadow: 0 0 15px var(--neon-glow); }
        
        .g-btn {
            width: 100%; background: var(--neon); color: black; border: none;
            padding: 18px; border-radius: 12px; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 25px var(--neon-glow);
        }
        .g-btn:active { transform: scale(0.95); }

        /* ЧАТЫ И СООБЩЕНИЯ */
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg {
            max-width: 85%; padding: 14px 18px; border-radius: 22px; font-size: 15px;
            line-height: 1.5; position: relative;
        }
        .msg.sent { 
            align-self: flex-end; background: var(--neon); color: black; font-weight: 600;
            border-bottom-right-radius: 4px; box-shadow: 0 5px 15px var(--neon-glow);
        }
        .msg.received { 
            align-self: flex-start; background: #1a1a1a; border: 1px solid #333;
            border-bottom-left-radius: 4px;
        }
        .msg-info { font-size: 10px; opacity: 0.7; margin-bottom: 5px; }
        
        /* GAWR PAINT (РИСОВАЛКА) */
        #canvas-wrap { flex: 1; position: relative; background: #000; }
        canvas { width: 100%; height: 100%; touch-action: none; }
        .paint-toolbar {
            height: 100px; background: #0a0a0a; border-top: 2px solid var(--neon);
            display: flex; align-items: center; gap: 15px; padding: 0 20px; overflow-x: auto;
        }
        .color-pick { width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent; flex-shrink: 0; }
        .color-pick.active { border-color: white; transform: scale(1.1); }

        /* ТАБ-БАР */
        .nav-bar {
            height: 80px; background: rgba(0,0,0,0.9); border-top: 1px solid #222;
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-link { color: #555; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 5px; font-size: 10px; }
        .nav-link.active { color: var(--neon); filter: drop-shadow(0 0 8px var(--neon)); }

        /* ИНПУТ СООБЩЕНИЯ */
        .msg-input-wrap {
            padding: 15px 20px; background: #050505; display: flex; gap: 12px; align-items: center;
            border-top: 1px solid #1a1a1a;
        }

        #recaptcha-container { margin-bottom: 15px; }
    </style>
</head>
<body>

    <div id="screen-auth" class="screen active">
        <div class="auth-box">
            <h1 style="font-size: 60px; color: var(--neon); text-shadow: 0 0 30px var(--neon); margin: 0;">GAWR</h1>
            <p style="color: #666; letter-spacing: 3px; font-weight: bold;">SECURE MESSENGER</p>
            
            <div id="auth-step-1" class="phone-input-container">
                <input type="tel" id="phone-number" class="g-input" placeholder="+7 (___) ___ __ __">
                <div id="recaptcha-container"></div>
                <button class="g-btn" onclick="gawrAuth.sendCode()">ПОЛУЧИТЬ КОД</button>
            </div>

            <div id="auth-step-2" class="phone-input-container" style="display: none;">
                <input type="number" id="verification-code" class="g-input" placeholder="000000">
                <button class="g-btn" onclick="gawrAuth.verifyCode()">ПОДТВЕРДИТЬ</button>
            </div>
            
            <p id="auth-error" style="color: var(--neon); margin-top: 20px; font-size: 12px;"></p>
        </div>
    </div>

    <div id="screen-hub" class="screen">
        <div class="gawr-header">
            <i data-lucide="menu"></i>
            <h1>HUB</h1>
            <i data-lucide="search"></i>
        </div>
        <div style="padding: 20px; flex: 1; overflow-y: auto;" id="chat-list">
            <div onclick="gawrApp.openChat('Global')" style="background: #111; padding: 20px; border-radius: 20px; border: 1px solid #222; display: flex; align-items: center; gap: 15px; margin-bottom: 10px;">
                <div style="width: 55px; height: 55px; border-radius: 50%; background: var(--neon); display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; font-size: 20px;">G</div>
                <div style="flex: 1;">
                    <div style="font-weight: bold; font-size: 18px;">GLOBAL ROOM</div>
                    <div style="font-size: 13px; color: #666;">Общий чат всех пользователей</div>
                </div>
                <div style="width: 10px; height: 10px; background: #0f0; border-radius: 50%; box-shadow: 0 0 10px #0f0;"></div>
            </div>
        </div>
        <div class="nav-bar">
            <div class="nav-link active"><i data-lucide="message-square"></i>Чаты</div>
            <div class="nav-link" onclick="gawrApp.switch('screen-paint')"><i data-lucide="palette"></i>G-Paint</div>
            <div class="nav-link"><i data-lucide="shield"></i>Safe</div>
            <div class="nav-link" onclick="gawrAuth.logout()"><i data-lucide="log-out"></i>Выход</div>
        </div>
    </div>

    <div id="screen-chat" class="screen">
        <div class="gawr-header">
            <div onclick="gawrApp.switch('screen-hub')"><i data-lucide="arrow-left"></i></div>
            <h1 id="chat-title">GLOBAL</h1>
            <i data-lucide="more-vertical"></i>
        </div>
        <div class="chat-area" id="messages-flow"></div>
        <div class="msg-input-wrap">
            <input type="text" id="m-input" class="g-input" style="margin: 0;" placeholder="Твое послание...">
            <button onclick="gawrApp.sendMessage()" class="g-btn" style="width: 60px; height: 60px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center;">
                <i data-lucide="send" color="black"></i>
            </button>
        </div>
    </div>

    <div id="screen-paint" class="screen">
        <div class="gawr-header">
            <div onclick="gawrApp.switch('screen-hub')"><i data-lucide="x"></i></div>
            <h1>G-PAINT</h1>
            <div onclick="gawrApp.saveStory()"><i data-lucide="check" color="#ff0000"></i></div>
        </div>
        <div id="canvas-wrap">
            <canvas id="main-canvas"></canvas>
        </div>
        <div class="paint-toolbar" id="palette">
            </div>
    </div>

    <script>
        /* --- КОНФИГУРАЦИЯ FIREBASE (ЗАМЕНИ НА СВОИ КЛЮЧИ) --- */
        const firebaseConfig = {
            apiKey: "ВСТАВЬ_СЮДА_API_KEY",
            authDomain: "ТВОЙ_ПРОЕКТ.firebaseapp.com",
            projectId: "ТВОЙ_ПРОЕКТ",
            storageBucket: "ТВОЙ_ПРОЕКТ.appspot.com",
            messagingSenderId: "ID_ОТПРАВИТЕЛЯ",
            appId: "ID_ПРИЛОЖЕНИЯ"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        /* --- ЯДРО GAWR AUTH --- */
        const gawrAuth = {
            confirmationResult: null,

            sendCode() {
                const phone = document.getElementById('phone-number').value;
                const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
                
                auth.signInWithPhoneNumber(phone, appVerifier)
                    .then(result => {
                        this.confirmationResult = result;
                        document.getElementById('auth-step-1').style.display = 'none';
                        document.getElementById('auth-step-2').style.display = 'block';
                    }).catch(err => {
                        document.getElementById('auth-error').innerText = "Ошибка: " + err.message;
                    });
            },

            verifyCode() {
                const code = document.getElementById('verification-code').value;
                this.confirmationResult.confirm(code).then(result => {
                    gawrApp.initUser(result.user);
                }).catch(err => {
                    document.getElementById('auth-error').innerText = "Неверный код!";
                });
            },

            logout() {
                auth.signOut().then(() => location.reload());
            }
        };

        /* --- ЯДРО GAWR APP --- */
        const gawrApp = {
            user: null,
            activeChat: 'global',
            isDrawing: false,
            ctx: null,

            init() {
                lucide.createIcons();
                this.initPaint();
                auth.onAuthStateChanged(u => {
                    if(u) {
                        this.user = u;
                        this.switch('screen-hub');
                        this.listenMessages();
                    }
                });
            },

            switch(id) {
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                if(id === 'screen-paint') this.resizeCanvas();
            },

            openChat(name) {
                this.activeChat = name.toLowerCase();
                document.getElementById('chat-title').innerText = name;
                this.switch('screen-chat');
                this.listenMessages();
            },

            sendMessage() {
                const input = document.getElementById('m-input');
                if(!input.value.trim()) return;

                db.collection('messages').add({
                    text: input.value,
                    sender: this.user.phoneNumber,
                    chat: this.activeChat,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                input.value = '';
            },

            listenMessages() {
                db.collection('messages')
                  .where('chat', '==', this.activeChat)
                  .orderBy('timestamp', 'asc')
                  .onSnapshot(snap => {
                      const flow = document.getElementById('messages-flow');
                      flow.innerHTML = '';
                      snap.forEach(doc => {
                          const data = doc.data();
                          const isMe = data.sender === this.user.phoneNumber;
                          flow.innerHTML += `
                            <div class="msg ${isMe ? 'sent' : 'received'} animate__animated animate__fadeInUp">
                                <div class="msg-info">${isMe ? 'Вы' : data.sender}</div>
                                ${data.text}
                            </div>
                          `;
                      });
                      flow.scrollTop = flow.scrollHeight;
                  });
            },

            /* --- МОДУЛЬ РИСОВАНИЯ --- */
            initPaint() {
                const canvas = document.getElementById('main-canvas');
                this.ctx = canvas.getContext('2d');
                const colors = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ffffff', '#ff00ff'];
                const palette = document.getElementById('palette');

                colors.forEach(c => {
                    const dot = document.createElement('div');
                    dot.className = 'color-pick';
                    dot.style.background = c;
                    dot.onclick = () => {
                        this.ctx.strokeStyle = c;
                        document.querySelectorAll('.color-pick').forEach(d => d.classList.remove('active'));
                        dot.classList.add('active');
                    };
                    palette.appendChild(dot);
                });

                const start = (e) => {
                    this.isDrawing = true;
                    this.ctx.beginPath();
                    this.ctx.moveTo(e.pageX || e.touches[0].pageX, (e.pageY || e.touches[0].pageY) - 80);
                };
                const draw = (e) => {
                    if(!this.isDrawing) return;
                    this.ctx.lineTo(e.pageX || e.touches[0].pageX, (e.pageY || e.touches[0].pageY) - 80);
                    this.ctx.lineWidth = 5;
                    this.ctx.lineCap = 'round';
                    this.ctx.stroke();
                };

                canvas.addEventListener('mousedown', start);
                canvas.addEventListener('mousemove', draw);
                canvas.addEventListener('mouseup', () => this.isDrawing = false);
                canvas.addEventListener('touchstart', start);
                canvas.addEventListener('touchmove', draw);
                canvas.addEventListener('touchend', () => this.isDrawing = false);
            },

            resizeCanvas() {
                const canvas = document.getElementById('main-canvas');
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight - 180;
                this.ctx.strokeStyle = '#ff0000';
            },

            saveStory() {
                alert("G-Story сохранена в зашифрованном виде!");
                this.switch('screen-hub');
            }
        };

        gawrApp.init();
    </script>
</body>
</html>
